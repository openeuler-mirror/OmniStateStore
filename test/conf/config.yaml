---
version: 1.0.0

project:
  name: "llt/bss_ut"
  desc: "bss ut project"
  prod: null
  team: null

pipeline:
  build:
    - task: "cmake_test"
      exec: "bash ../../scripts/build.sh -t debug --ut"
  run:
    - task: "run_test"
      exec: "cd ../../build/test/llt/; ./bss_ut"
  report:
    - task: "lcov_report"
      exec: "cd ../build; mkdir -p gcovr_report;pwd;lcov --d ../.. --c --output-file ../build/test.info --rc lcov_branch_coverage=1;lcov -r ../build/test.info \"*/home/huawei/*\" \"*/7.3.0/*\" \"*/build/*\" \"*/buildtools/*\" \"*/3rdparty/*\" \"*/test/llt/*\" \"*generated.h\" -output-file ../build/coverage.info --rc lcov_branch_coverage=1;genhtml -o ../build/gcovr_report ../build/coverage.info --show-details --legend --rc lcov_branch_coverage=1"
      args: false
  clean:
    - task: "clean_target"
      exec: "rm -rf ../../build/test/llt/"
      args: false
    - task: "clean"

components:
  - type: "hdt_cmc_c_cpp"
    repo: null
    dest: null
    manifest:
      gtest: null
      gcov: null
      asan: null
